query {
  items_page_by_column_values(
    limit: 50
    board_id: 1234567890
    columns: [
      {
        column_id: "text"
        column_values: ["This is a text column"]
      }
      {
        column_id: "country"
        column_values: ["US", "IL"]
      }
    ]
  ) {
    cursor
    items {
      id
      name
    }
  }
}
