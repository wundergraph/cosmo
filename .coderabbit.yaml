# Auto-generated by codereview pipeline from team review history
# See codereview/STRATEGY.md for details

language: en-US

reviews:
  collapse_walkthrough: true
  poem: false
  high_level_summary: true
  auto_review:
    enabled: true
  path_filters:
    - "!codereview/**"

  instructions: |
    These guidelines are derived from 1358 code review comments by the cosmo team working on GraphQL federation router platform development. They represent patterns learned from building production-scale GraphQL infrastructure in Go and TypeScript.

    ## Error Handling & Logging

    - Always wrap errors with `%w` instead of string formatting for proper error chains (#2537, #2472)
    - Log authentication errors rather than discarding them with structured fields (#2192)
    - Include both maximum and actual values in limit exceeded error messages (#2090)
    - Use structured error types like `StreamHandlerError` for hook failures instead of generic errors (#2273)
    - Log errors from `ApplyRouterResponseHeaderRules` - never discard router response header errors (#header-propagation)
    - Return configuration validation errors at startup, not at runtime (#2379)

    ## GraphQL Federation Patterns

    - Router response headers must be applied after GraphQL resolution completes to access `request.error` (#header-propagation)
    - Always include `__typename": "edfs__PublishResult"` prefix in PubSub publish responses (#2273)
    - Filter `@requires` fields from entity messages since they're resolved by separate RPCs (#2439)
    - Use `ignoredHeaders` list including `Content-Encoding` and `Content-Length` in header propagation (#header-propagation)
    - Handle duplicate struct fields carefully when merging main into feature branches - auto-merge can create duplicates (#merge-patterns)

    ## Go Code Quality & Modern Patterns

    - Use modern Go syntax: `range over int`, `wg.Go()`, structured logging with modern idioms (#modern-go, #2379, #2522)
    - Use `slices.ContainsFunc` and `slices.Contains` for membership checks instead of manual loops (#2280, #2078)
    - Use `t.TempDir()` in tests instead of manual cleanup with `os.RemoveAll` (#2236)
    - Initialize maps and slices with known capacity when possible: `make([]string, 0, len)` (#2538)
    - Use `sync.Map` for read-heavy concurrent access patterns instead of mutex-protected maps (#2379)

    ## Testing Standards

    - Name test functions descriptively: "should succeed with valid token" not generic names (#2067)
    - Use `require.EventuallyWithT` for testing async conditions with proper timeouts (#2445)
    - Test both positive and negative cases - don't skip error condition testing (#2224)
    - Use inline snapshots for complex output validation instead of large fixture files (#2302)
    - Never call `t.Fatal`, `t.FailNow` in goroutines - use channels to communicate back to main test thread (#2088)

    ## Configuration Management

    - Set configuration defaults in JSON schema files, not just in Go code defaults (#2068)
    - Use `envprefix` for environment variable naming consistency across config sections (#2379)
    - Validate mutually exclusive or dependent config options using JSON schema constraints (#2472)
    - Document config field behavior including zero-value meanings: "0 disables feature" (#2090)

    ## PubSub & Streaming Architecture

    - Clone event data for mutable operations: use `slices.Clone(e.Data)` for safety (#2304, #2087)
    - Use semaphores to control concurrency in event processing: `golang.org/x/sync/semaphore` (#2288)
    - Handle partial publish failures gracefully in batch operations - some messages may succeed (#2087)
    - Validate JSON structure before applying templating to prevent malformed output (#2273)

    ## Authentication & Security

    - Validate router configuration paths to prevent path traversal attacks (#2379)
    - Check for empty/nil authentication tokens during config validation, not runtime (#2192)
    - Use parameterized queries consistently to prevent SQL injection in analytics code (#2331)
    - Log auth failures with structured fields for debugging without exposing sensitive data (#2192)

    ## Database & Repository Patterns

    - Run related database operations within transactions to ensure consistency (#2553)
    - Abstract business logic into repository methods, keep RPC handlers thin (#2553)
    - Batch database operations when deleting multiple related records for efficiency (#2467)
    - Use proper error handling in repository methods - don't silently swallow database errors (#2553)

    ## Proto & gRPC Development

    - Generate stable field numbers using lock files to prevent proto compatibility breaks (#2302)
    - Handle GraphQL abstract types (interfaces/unions) with selection set rewriting before proto conversion (#2439)
    - Map GraphQL list types to proto repeated fields with proper wrapper type handling (#2086)
    - Use field validation in proto generation to catch schema mismatches early (#2439)

    ## Performance Optimization

    - Cache normalized GraphQL operations to avoid re-parsing identical queries (#2318)
    - Implement connection pooling for HTTP clients with configurable retry logic (#2445)
    - Use memory-efficient patterns: string builders for large concatenations, pooled buffers (#2379)
    - Avoid unnecessary allocations in hot paths - reuse buffers and pre-allocate collections (#2538)


    ## Known False Positive Patterns

    The following patterns were previously flagged but explicitly rejected by human reviewers.
    Do NOT flag these unless the context is clearly different from the original case.

    - "Fix misnamed profiling option (profilesSampleRate), clamp sample rates, and make init resilient." ‚Äî rejected: "This is wrong, this setting is for the @sentry/profiling-node integration" (#2199)
    - "Operation body attributes are wiped before export" ‚Äî rejected: "This is intentional, the flag is false by default, and the attributes are only for use with other OTEL endpoints." (#2235)
    - "Verify the graphql-go-tools release candidate version is intentional." ‚Äî rejected: "What is wrong with you today? Has AWS outage affected your weak mind?" (#2246)
    - "Consider the implications of returning a non-cloned slice from MutableEvent.GetData()." ‚Äî rejected: "It's intentional like this and part of the hook interface design. A `MutableEvent` is designed to be mutable, while a `Event` is immutable. Since `Eve" (#2273)
    - "Cycle detection only checks direct cycles, missing transitive dependencies." ‚Äî rejected: "Take a look at `01-basic-validation.test.ts`. There is a test that actually already checks this behavior. The visitor will visit every field with argu" (#2290)
    - "Verify that NetworkError is thrown for authentication failures." ‚Äî rejected: "Incorrect: https://github.com/keycloak/keycloak/blob/26.2.5/js/libs/keycloak-admin-client/src/utils/fetchWithError.ts#L25" (#2354)
    - "Fix the incorrect sync.WaitGroup usage." ‚Äî rejected: "The code compiles and tests pass successfully. The wg variable is of type errgroup.Group from golang.org/x/sync/errgroup, not sync.WaitGroup." (#2379)
    - "`GraphQL Federation `@requires` directive field set syntax inline fragments abstract types specification`" ‚Äî rejected: "I know, this is temporary. The implementation for the abstract types is quite complex and I decided to implement this in multiple iterations." (#2439)
    - "`Apollo Federation `@requires` directive schema composition behavior`" ‚Äî rejected: "`@requires` fields are resolved by a different RPC. Therefore it doesn't make sense to include the field in the entity message. RPCs that resolve the " (#2439)
    - "`js-yaml: ">=4.1.1"` is out of scope for CVE-2026-25896 and uses an unbounded range." ‚Äî rejected: "Incorrect finding, this just adds trailing comma (`,`) since other elements are added after it." (#2552)
    - "Consider using `bytes` for large proto blobs" ‚Äî rejected: "We do work with text we want to have it encoded" (#2079)
    - "Default logger is not assigned back to ServeConfig and lacks DisableTime." ‚Äî rejected: "No that was on purpose because the underlying framework creates its own logger. I only need to because I want to add the logger to the context with an" (#2132)
    - "Multipart preamble parsing is brittle; accept optional blank line and charset." ‚Äî rejected: "No, this is OUR multipart implementation, and it's rigid" (#2141)
    - "Verify MCP-Go APIs: WithStateLess and StreamableHTTPServer availability" ‚Äî rejected: "But we use `github.com/mark3labs/mcp-go v0.38.0`, you looked at the wrong place." (#2157)
    - "Add coverage for ‚Äúno cap‚Äù semantics (MaxDuration==0) in shouldUseRetryAfter." ‚Äî rejected: "This is not applicable since we did not clamp." (#2167)

  path_instructions:
    - path: "router/**"
      instructions: |
        Looking at the code review comments, here are the focused review rules specific to the router subsystem:

        - Use `%w` to wrap errors with `fmt.Errorf` instead of string concatenation for proper error chaining (#2353, #2537)
        - Avoid `t.Fatal()` or `require` calls inside goroutines during tests - use channels or other coordination mechanisms (#2088, #2491)
        - For read-heavy operations like operation registries, use `sync.Map` instead of `map` with mutex for better performance (#2379)
        - When copying events or data structures, perform deep copies using `bytes.Clone()` or `slices.Clone()` to avoid shared memory issues (#2087, #2304)
        - Header propagation rules must handle comma-separated values correctly and avoid breaking `Set-Cookie` headers that cannot be joined (#2532)
        - Config inheritance should apply "all" defaults first, then override with subgraph-specific values, not copy defaults when subgraph config exists (#2155)
        - Use descriptive test names in sentence format that describe the assertion, not just the action (e.g., "should succeed with valid token") (#2067, #2485)
        - Environment variables should use consistent prefixes like `ROUTER_` and follow the config structure hierarchy (#2485, #2167)
        - Validate operation name length early in request processing to prevent resource exhaustion from extremely long names (#2090)
        - Log authentication/authorization errors at appropriate levels and include context for debugging without exposing sensitive data (#2192, #2551)

        ## Expert Escalation
        When you detect a complex or architecturally significant change in this subsystem,
