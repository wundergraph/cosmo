    - path: "connect/**"
      instructions: |
        ‚Ä¢ When generating protobuf messages, filter out `@requires` fields from entity messages since they are resolved by separate RPCs and shouldn't be included in the entity definition (#2439)
        ‚Ä¢ Always skip special federation fields `_entities` and `_service` when processing schema fields in SDL visitors (#2439)
        ‚Ä¢ Use `Object.entries()` iteration pattern instead of manual key enumeration when working with type maps in protographic visitors (#2290)
        ‚Ä¢ Deduplicate scalar type mappings by referencing existing `SCALAR_TYPE_MAP` and `SCALAR_WRAPPER_TYPE_MAP` from `operations/type-mapper.ts` rather than recreating them (#2439)
        ‚Ä¢ Handle empty or missing arguments with nullish coalescing: `(ctx.node.arguments?.length ?? 0) === 0` instead of direct property access (#2290)
        ‚Ä¢ When working with abstract types (interfaces/unions), always include selection set normalization tests that cover interface fragments and union member intersections (#2439)
        ‚Ä¢ Avoid recursive validation logic in SDL visitors since the visitor pattern already handles individual field traversal automatically (#2290)
        ‚Ä¢ Use gqlgen config `skip_runtime: true` for federation directives instead of manual code exclusions when possible (#2290)
        ‚Ä¢ Test complex union/interface nesting scenarios including same-type references at different nesting levels and self-referential union members (#2439)
        ‚Ä¢ Always validate that protobuf message deduplication works correctly within single recursion levels but allows different messages across nesting levels (#2439)

    - path: "cli/**"
      instructions: |
        - Use `console.log` for plugin handshake communication - it's acceptable for this specific inter-process protocol (#2293)
        - Document patches with inline comments explaining why they're needed, not just in PR descriptions (#2293)
        - Avoid duplicate switch statements for language handling - use single if statements for single cases or refactor into scalable patterns (#2293)
        - Store template types (grpc-service vs plugin) in separate directories for better organization (#2033)
        - Use chained command builder pattern for better TypeScript typing instead of separate declarations (#2033)
        - Replace infinite parameter lists with option objects/classes for language-specific settings (#2302)
        - Initialize arrays with valid file extensions and use `includes()` instead of `|| ext === '.gql' || ext === '.graphql'` chains (#2302)
        - Include all GraphQL file variants: `.graphql`, `.gql`, `.graphqls`, `.gqls` in validation (#2302)
        - Use `@` prefix convention for file path flags (like `@path/to/file.json`) and document this requirement (#2302)
        - Combine `await` and `.catch()` for cleaner error handling instead of nested try/catch blocks (#2033)
        - Prefix Makefile PHONY targets with `.` (`.PHONY:` not `PHONY:`) (#2293)
        - Avoid inline `require()` statements - use top-level imports (#2302)
        - Consider startup latency impact when adding telemetry or initialization code (#2416)

