# yaml-language-server: $schema=./pkg/config/config.schema.json
#
# Offline router config for testing the cache warmer `item_delay` option.
#
# Run from the `router/` directory:
#   go run ./cmd/router --config cache-warmup-test.config.yaml
#
# It needs no control plane and no running subgraphs: the cache warmer only
# normalizes/validates/plans operations, it does not call subgraphs.
#
# On startup watch the logs for:
#   "Warmup started"   -> includes the configured "item_delay" field
#   per-item processing spaced out by `item_delay` (2s here, 1 worker)
#   "Warmup completed" -> after ~20s (10 fixture operations x 2s)

version: "1"

# Standard employees federated demo schema, checked into the repo.
execution_config:
  file:
    path: "../router-tests/testenv/testdata/config.json"

cache_warmup:
  enabled: true
  # One worker so the fixed delay is applied strictly sequentially and is
  # obvious in the logs. Bump this to see the delay applied per worker.
  workers: 1
  items_per_second: 50
  # The new option under test: a fixed delay after each item is processed.
  item_delay: 2s
  # Generous timeout so the delayed warmup (~20s) is not cut short.
  timeout: 60s
  source:
    filesystem:
      # 10 simple `query { <alias>: employees { id } }` operation files.
      path: "../router-tests/operations/testdata/cache_warmup/rate_limit"

graph:
  token: ""

log_level: debug
dev_mode: true
listen_addr: "localhost:3002"
playground:
  enabled: true
  path: "/"
