# yaml-language-server: $schema=./pkg/config/config.schema.json

# See pkg/config/config.go for the full list of configuration options.
# This file is used for the demo environment

version: "1"

events:
  providers:
    nats:
      - id: default
        url: "nats://localhost:4222"
      - id: my-nats
        url: "nats://localhost:4222"
    kafka:
      - id: my-kafka
        brokers:
          - "localhost:9092"
    redis:
      - id: my-redis
        urls:
          - "redis://localhost:6379/2"

# In-memory cache warmer: reuse cached query plans in memory and
# re-warm normalization/validation/planning caches on schema changes
# and hot config reloads.
cache_warmup:
  enabled: true
  in_memory_fallback: true
  source:
    cdn:
      enabled: false