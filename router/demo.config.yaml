# yaml-language-server: $schema=./pkg/config/config.schema.json

# See pkg/config/config.go for the full list of configuration options.
# This file is used for the demo environment

version: "1"

events:
  providers:
    nats:
      - id: default
        url: "nats://localhost:4222"
      - id: my-nats
        url: "nats://localhost:4222"
    kafka:
      - id: my-kafka
        brokers:
          - "localhost:9092"
    redis:
      - id: my-redis
        urls:
          - "redis://localhost:6379/2"


storage_providers:
  redis:
    - id: "default"
      urls:
        - "redis://localhost:6379/2"
      cluster_enabled: false

entity_caching:
  enabled: true
  l1:
    enabled: true
    max_size: "100MB"
  l2:
    enabled: true
    storage:
      provider_id: "default"
      key_prefix: "cosmo_entity_cache"
    circuit_breaker:
      enabled: false
  events_export:
    enabled: true
    endpoint: http://localhost:4005

traffic_shaping:
  all:
    retry:
      enabled: false

feature_flag_rollouts:
  enabled: true