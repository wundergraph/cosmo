name: Release Preview

on:
  push:
    tags-ignore:
      - '**'
    branches:
      - 'main'
    paths-ignore:
      - 'docs*/**'
      - '*.md'
      - '.github/CODEOWNERS'

concurrency:
  group: ${{github.workflow}}-${{github.head_ref}}
  cancel-in-progress: false

env:
  CI: true
  DO_NOT_TRACK: '1'

jobs:
  version:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: |
            cosmo
          permission-actions: write
          permission-contents: write
          permission-workflows: write

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: ./.github/actions/node

      - run: npm config set //registry.npmjs.org/:_authToken $NPM_TOKEN
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install
        run: pnpm install --frozen-lockfile --filter='wundergraph-cosmo'

      - name: Generate next release (dry-run)
        run: pnpm run release-preview --yes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show CHANGELOG.md
        run: echo -e "\`\`\`diff\n$(git --no-pager diff './*/CHANGELOG.md')\n\`\`\`" >> $GITHUB_STEP_SUMMARY
