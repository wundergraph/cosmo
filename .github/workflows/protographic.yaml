name: Protographic CI
on:
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - 'protographic/**/*'
      - '.github/workflows/protographic.yaml'

concurrency:
  group: ${{github.workflow}}-${{github.head_ref}}
  cancel-in-progress: true

env:
  CI: true
  DO_NOT_TRACK: '1'

jobs:
  build_test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/node

      - name: Install dependencies
        run: pnpm install --filter ./connect --filter ./composition --filter ./protographic

      - name: Generate code
        run: pnpm generate

      # We run linter + formatting and fail CI if uncommitted changes are detected
      - name: Lint & format
        run: pnpm run --filter ./protographic lint:fix

      - uses: ./.github/actions/git-dirty-check
        with:
          package-name: protographic

      - name: Build
        run: pnpm run --filter ./connect --filter ./composition --filter ./protographic build

      - name: Test
        run: pnpm run --filter ./protographic test:coverage

      - name: Upload test results to Codecov
        uses: ./.github/actions/codecov-upload-pr
        with:
          artifact-name: protographic-tests-coverage
          coverage-path: |
            protographic/coverage/clover.xml
            protographic/coverage/coverage-final.json
          retention-days: 14
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
