name: Build and release wgc binaries
on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  wgc-releases-matrix:
    if: startsWith(github.event.release.tag_name, 'wgc@')
    name: Build and release wgc binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        target: [bun-linux-x64, bun-linux-arm64, bun-darwin-x64, bun-darwin-arm64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: ./.github/actions/node

      - name: Install dependencies
        run: pnpm --filter ./cli --filter ./connect --filter ./shared --filter ./composition --filter ./protographic install --frozen-lockfile

      - name: Build
        run: pnpm --filter ./cli --filter ./connect --filter ./shared --filter ./composition --filter ./protographic run build

      - uses: winterjung/split@v2
        id: split
        with:
          separator: '@'
          msg: '${{ github.event.release.tag_name }}'

      - name: 'Build wgc binary'
        working-directory: cli
        run: bun build --compile --minify --sourcemap --target ${{ matrix.target }} src/index.ts --outfile out/wgc-experimental-${{ steps.split.outputs._1 }}-${{ matrix.target }}

      - name: 'Gzip wgc binary'
        working-directory: cli
        shell: bash
        # the '*' here is needed to catch `.exe` files for Windows builds, if we ever add them
        run: gzip -9 -v out/wgc-experimental-${{ steps.split.outputs._1 }}-${{ matrix.target }}*

      - name: 'Upload build to release'
        working-directory: cli
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        # the '*' here is needed to catch `.exe` files for Windows builds, if we ever add them
        run: gh release upload ${{ github.event.release.tag_name }} out/wgc-experimental-${{ steps.split.outputs._1 }}-${{ matrix.target }}*.gz --clobber

  notify-homebrew-tap:
    if: startsWith(github.event.release.tag_name, 'wgc@')
    name: Notify homebrew tap of wgc release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Extract version
        id: version
        shell: bash
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: echo "version=${TAG#wgc@}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to homebrew-cosmo
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: wundergraph
          repositories: homebrew-cosmo
          permission-contents: write

      - name: Dispatch wgc-release
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: wundergraph/homebrew-cosmo
          event-type: wgc-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
