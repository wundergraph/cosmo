name: Check PR Description
on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
    branches-ignore:
      # release-please PRs are not required to have a manual description
      - 'release-please*'

permissions:
  pull-requests: read

jobs:
  build_test:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR description
        uses: actions/github-script@v7
        with:
          script: |
            const prDescription = context.payload.pull_request.body || '';
            const minLength = 20; // Minimum required length for PR description
            
            // Try to isolate content before the checklist
            const checklistHeader = '## Checklist';
            const checklistIndex = prDescription.indexOf(checklistHeader);
            const relevantDescription = checklistIndex !== -1 ? prDescription.substring(0, checklistIndex) : prDescription;
            
            // Remove common boilerplate like HTML comments from the relevant section
            const contentWithoutComments = relevantDescription
              .replace(/<!--[\s\S]*?-->/g, '') // Remove HTML comments
              .trim();
              
            if (contentWithoutComments.length < minLength) {
              core.setFailed(`Your PR description before the '## Checklist' section is too short or contains mainly boilerplate/comments. Please add a proper description of at least ${minLength} characters that explains the purpose of your changes, excluding comments. You can also use GitHub Copilot pull request summaries to help you write a good description.`);
              return;
            }
            
            console.log('PR description has sufficient content before the checklist! ✅'); 