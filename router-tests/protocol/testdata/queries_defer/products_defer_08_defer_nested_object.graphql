query {
  products {
    ... on IProduct {
      upc
    }
    ... on Cosmo {
      name
      repositoryURL
      ... @defer { lead { details { forename } } }
    }
    ... on SDK {
      owner { details { forename } }
      clientLanguages
      unicode
    }
  }
  productTypes {
    __typename
    ... on IProduct {
      upc
    }
    ... on Documentation {
      url(product: COSMO)
      urls(products: [CONSULTANCY, ENGINE, HUMAN_RESOURCES, SDK])
    }
    ... on Consultancy {
      name
      ... @defer { lead { details { forename } } }
    }
  }
}
