query {
  products {
    ...IProductFragment @defer
    ...CosmoFragment @defer
    ...SDKFragment @defer
  }
  productTypes {
    __typename
    ... on Documentation @defer {
      url(product: COSMO)
      urls(products: [CONSULTANCY, ENGINE, HUMAN_RESOURCES, SDK])
    }
    ...IProductFragment @defer
    ... on Consultancy {
      lead {
        details {
          forename
        }
      }
      name
    }
  }
}

fragment IProductFragment on IProduct {
  upc
}

fragment CosmoFragment on Cosmo {
  name
  lead {
    details {
      forename
    }
  }
  repositoryURL
}

fragment SDKFragment on SDK {
  owner {
    details {
      forename
    }
  }
  clientLanguages
  unicode
}

fragment EmployeeFragment on Employee {
  id
  details {
    forename
    location {
      language
    }
    maritalStatus
  }
  role {
    departments
    title
  }
  products
}
