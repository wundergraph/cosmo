query {
  products {
    upc
    ... on Cosmo {
      name
      lead { details { forename } }
      repositoryURL
    }
    ... on SDK {
      owner { details { forename } }
      clientLanguages
      unicode
    }
  }
  ... @defer {
    productTypes {
      __typename
      upc
      ... on Documentation {
        url(product: COSMO)
        urls(products: [CONSULTANCY, ENGINE, HUMAN_RESOURCES, SDK])
      }
      ... on Consultancy {
        lead { details { forename } }
        name
      }
    }
  }
}
