query {
  products {
    upc
    ... on Cosmo {
      name
      ... @defer {
        repositoryURL
        ... @defer { lead { details { forename } } }
      }
    }
  }
  productTypes {
    __typename
    ... on Documentation { url(product: COSMO) }
    ... on Consultancy { name lead { details { forename } } }
  }
}
