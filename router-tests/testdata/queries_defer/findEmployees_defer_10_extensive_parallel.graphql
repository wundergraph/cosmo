query {
  ... @defer {
    a: findEmployees(criteria: { hasPets: true }) {
      details { forename }
    }
  }
  ... @defer {
    b: findEmployees(criteria: { hasPets: false, nationality: GERMAN, nested: { maritalStatus: MARRIED } }) {
      details { forename }
    }
  }
  ... @defer {
    c: findEmployees(criteria: { hasPets: true, nationality: ENGLISH, nested: { maritalStatus: MARRIED } }) {
      details { forename }
    }
  }
  ... @defer {
    d: findEmployees(criteria: { hasPets: true, nationality: ENGLISH, nested: { maritalStatus: MARRIED, hasChildren: true } }) {
      details { forename }
    }
  }
}
