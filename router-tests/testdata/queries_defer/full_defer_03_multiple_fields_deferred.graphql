query {
  employees { id details { forename } }
  employee(id: 1) { id details { forename location { language } } }
  ... @defer {
    teammates(team: OPERATIONS) { id details { forename } products }
    productTypes {
      ... on Documentation { url(product: SDK) }
      ... on Consultancy { name lead { details { forename } } }
    }
  }
  a: findEmployees(criteria: { hasPets: true, nationality: UKRAINIAN, nested: { maritalStatus: ENGAGED } }) {
    details { forename }
  }
  b: findEmployees(criteria: { hasPets: true, nationality: GERMAN, nested: { maritalStatus: MARRIED, hasChildren: true } }) {
    details { forename }
  }
}
