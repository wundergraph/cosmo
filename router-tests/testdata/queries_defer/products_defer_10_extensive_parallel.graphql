query {
  ... @defer {
    products {
      ... @defer { upc }
      ... on Cosmo {
        ... @defer { name }
        ... @defer { repositoryURL }
        ... @defer { lead { details { forename } } }
      }
      ... on SDK {
        ... @defer { clientLanguages }
        ... @defer { unicode }
        ... @defer { owner { details { forename } } }
      }
    }
  }
  ... @defer {
    productTypes {
      __typename
      ... @defer { upc }
      ... on Documentation {
        ... @defer {
          url(product: COSMO)
          urls(products: [CONSULTANCY, ENGINE, HUMAN_RESOURCES, SDK])
        }
      }
      ... on Consultancy {
        ... @defer { name }
        ... @defer { lead { details { forename } } }
      }
    }
  }
}
