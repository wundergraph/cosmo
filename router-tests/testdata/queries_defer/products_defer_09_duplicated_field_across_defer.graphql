query {
  products {
    upc
    ... on Cosmo {
      name
      lead { details { forename } }
      ... @defer { lead { details { forename } } repositoryURL }
    }
  }
  productTypes {
    __typename
    ... on Documentation { url(product: COSMO) }
    ... on Consultancy { name lead { details { forename } } }
  }
}
