query {
  products {
    upc
    ... on Cosmo {
      name
      ... @defer {
        repositoryURL
        lead { details { forename } }
      }
    }
    ... on SDK {
      owner { details { forename } }
      clientLanguages
      unicode
    }
  }
  productTypes {
    __typename
    upc
    ... on Documentation {
      url(product: COSMO)
      urls(products: [CONSULTANCY, ENGINE, HUMAN_RESOURCES, SDK])
    }
    ... on Consultancy {
      lead { details { forename } }
      name
    }
  }
}
