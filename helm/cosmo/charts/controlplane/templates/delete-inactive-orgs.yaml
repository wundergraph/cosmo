{{ if .Values.jobs.deleteInactiveOrgs.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: "{{ include "controlplane.fullname" . }}-delete-inactive-orgs"
  labels:
    {{- include "controlplane.job.labels" (dict "additionalLabels" .Values.jobs.deleteInactiveOrgs.additionalLabels "context" .) | nindent 4 }}
spec:
  schedule: {{ .Values.jobs.deleteInactiveOrgs.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      parallelism: 1
      template:
        metadata:
          name: "{{ include "controlplane.fullname" . }}-delete-inactive-orgs"
          labels:
            {{- include "controlplane.job.labels" (dict "additionalLabels" .Values.jobs.deleteInactiveOrgs.additionalLabels "context" .) | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: delete-inactive-orgs
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              image: "{{ include "controlplane.image" . }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              env:
                - name: REDIS_HOST
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "controlplane.fullname" . }}-configmap
                      key: redisHost
                - name: REDIS_PORT
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "controlplane.fullname" . }}-configmap
                      key: redisPort
                {{- if .Values.configuration.redisPassword }}
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: redisPassword
                {{- end }}
                {{- if .Values.configuration.redisTlsCert }}
                - name: REDIS_TLS_CERT
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: redisTlsCert
                {{- end }}
                {{- if .Values.configuration.redisTlsKey }}
                - name: REDIS_TLS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: redisTlsKey
                {{- end }}
                {{- if .Values.configuration.redisTlsCa }}
                - name: REDIS_TLS_CA
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: redisTlsCa
                {{- end }}
                - name: DB_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: databaseUrl
                {{- if .Values.configuration.databaseTlsCert }}
                - name: DB_TLS_CERT
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: databaseTlsCert
                {{- end }}
                {{- if .Values.configuration.databaseTlsCa }}
                - name: DB_TLS_CA
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: databaseTlsCa
                {{- end }}
                {{- if .Values.configuration.databaseTlsKey }}
                - name: DB_TLS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}
                      key: databaseTlsKey
                {{- end }}
                - name: KC_REALM
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "controlplane.fullname" . }}-configmap
                      key: keycloakRealm
                - name: KC_LOGIN_REALM
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "controlplane.fullname" . }}-configmap
                      key: keycloakLoginRealm
                - name: KC_API_URL
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "controlplane.fullname" . }}-configmap
                      key: keycloakApiUrl
                - name: KC_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}

                      key: keycloakAdminUser
                - name: KC_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "controlplane.secretName" . }}

                      key: keycloakAdminPassword
                - name: KC_CLIENT_ID
                  valueFrom:
                    configMapKeyRef:
                      name: {{ include "controlplane.fullname" . }}-configmap
                      key: keycloakClientId
              args:
                - "/app/dist/bin/delete-inactive-orgs.js"
{{- end }}