# Where are all the schema files located? globs are supported eg  src/**/*.graphqls
schema:
  - subgraph/*.graphqls

# Where should the generated server code go?
exec:
  filename: subgraph/generated/generated.go
  package: generated

federation:
  filename: subgraph/generated/federation.go
  package: generated
  version: 2
  options:
    explicit_requires: true

# Where should any generated models go?
model:
  filename: subgraph/model/models_gen.go
  package: model

# Where should the resolver implementations go?
resolver:
  layout: follow-schema
  dir: subgraph
  package: subgraph

directives:
  openfed__entityCache:
    skip_runtime: true
  openfed__queryCache:
    skip_runtime: true
  openfed__cacheInvalidate:
    skip_runtime: true
  openfed__cachePopulate:
    skip_runtime: true
  openfed__is:
    skip_runtime: true

models:
  Viewer:
    fields:
      recommendedArticles:
        resolver: true
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
