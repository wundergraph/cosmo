extend schema
@link(url: "https://specs.apollo.dev/federation/v2.5", import: ["@authenticated", "@composeDirective", "@external", "@extends", "@inaccessible", "@interfaceObject", "@override", "@provides", "@key", "@requires", "@requiresScopes", "@shareable", "@tag"])

schema {
  query: Query
  mutation: Mutation
}

type Query {
  projects: [Project!]!
  project(id: ID!): Project
  projectStatuses: [ProjectStatus!]!
  projectsByStatus(status: ProjectStatus!): [Project!]!
  projectResources(projectId: ID!): [ProjectResource!]!
  searchProjects(query: String!): [ProjectSearchResult!]!
  milestones(projectId: ID!): [Milestone!]!
  tasks(projectId: ID!): [Task!]!
  projectActivities(projectId: ID!): [ProjectActivity!]!

  # New query fields with different list patterns
  projectTags: [String]  # nullable list of nullable strings
  archivedProjects: [Project]!  # non-nullable list of nullable projects
  tasksByPriority(projectId: ID!): [[Task]]  # nullable list of nullable lists
  resourceMatrix(projectId: ID!): [[ProjectResource!]!]!  # non-nullable list of non-nullable lists

  # query to simulate that the service goes down
  killService: Boolean!
  panic: Boolean!

  nodesById(id: ID!): [Node!]!
}

type Mutation {
  addProject(project: ProjectInput!): Project!
  addMilestone(milestone: MilestoneInput!): Milestone!
  addTask(task: TaskInput!): Task!
  updateProjectStatus(projectId: ID!, status: ProjectStatus!): ProjectUpdate!
}

input ProjectInput {
  name: String!
  description: String
  startDate: String   # ISO date
  endDate: String     # ISO date
  status: ProjectStatus!
}

input MilestoneInput {
  projectId: ID!
  name: String!
  description: String
  dueDate: String     # ISO date
  status: MilestoneStatus!
}

input TaskInput {
  projectId: ID!
  assigneeId: Int
  name: String!
  description: String
  priority: TaskPriority!
  status: TaskStatus!
  estimatedHours: Float
}

# Interfaces
interface Node {
  id: ID!
}

interface Timestamped {
  startDate: String
  endDate: String
}

interface Assignable {
  assigneeId: Int
}

# Updated Project type implementing interfaces
type Project implements Node & Timestamped @key(fields: "id") {
  id: ID!
  name: String!
  description: String
  startDate: String   # ISO date
  endDate: String     # ISO date
  status: ProjectStatus!
  # Federated references:
  teamMembers: [Employee!]!
  relatedProducts: [Product!]!  # from products subgraph
  # Project milestones or checkpoints
  milestoneIds: [String!]  # Array of milestone identifiers

  # New fields for extended functionality
  milestones: [Milestone!]!
  tasks: [Task!]!
  progress: Float  # Completion percentage

  # New fields with various list patterns for testing
  tags: [String]  # nullable list of nullable tags
  alternativeProjects: [Project]  # nullable list of nullable projects
  dependencies: [Project!]  # nullable list of non-nullable projects
  resourceGroups: [[ProjectResource!]!]!  # nested lists: non-nullable list of non-nullable lists
  tasksByPhase: [[Task!]]!  # nested lists: non-nullable list of nullable lists
  milestoneGroups: [[Milestone]]  # nested lists: nullable list of nullable lists
  priorityMatrix: [[[Task!]!]!]  # triple nested: non-nullable list of non-nullable lists of non-nullable lists

  # Recursive field resolver for project hierarchy
  subProjects(includeArchived: Boolean): [Project!]! @connect__fieldResolver(context: "id name status")

  # Computed fields with @connect__fieldResolver
  filteredTasks(status: TaskStatus, priority: TaskPriority, limit: Int): [Task!]! @connect__fieldResolver(context: "id")
  completionRate(includeSubtasks: Boolean): Float! @connect__fieldResolver(context: "id startDate endDate status")
  estimatedDaysRemaining(fromDate: String): Int @connect__fieldResolver(context: "id endDate status")
  criticalDeadline(withinDays: Int): Timestamped @connect__fieldResolver(context: "id status milestones")
  topPriorityItem(category: String): ProjectSearchResult @connect__fieldResolver(context: "id status")

  # No-arg field resolvers (expensive computed fields without arguments)
  taskCount: Int! @connect__fieldResolver(context: "id")
  activeMilestoneCount: Int! @connect__fieldResolver(context: "id")
}

# New types - simplified with ID references only
type Milestone implements Node & Timestamped @key(fields: "id") {
  id: ID!
  projectId: ID!
  name: String!
  description: String
  startDate: String   # ISO date (when milestone work starts)
  endDate: String     # ISO date (milestone due date)
  status: MilestoneStatus!
  completionPercentage: Float

  # New fields with different list patterns
  dependencies: [Milestone]!  # non-nullable list of nullable milestones
  subtasks: [Task]  # nullable list of nullable tasks
  reviewers: [Employee!]  # nullable list of non-nullable employees

  # Computed fields with @connect__fieldResolver
  isAtRisk(threshold: Float): Boolean! @connect__fieldResolver(context: "id endDate status completionPercentage")
  daysUntilDue(fromDate: String): Int @connect__fieldResolver(context: "endDate")
}

type Task implements Node & Assignable @key(fields: "id") {
  id: ID!
  projectId: ID!
  milestoneId: ID
  assigneeId: Int
  name: String!
  description: String
  priority: TaskPriority!
  status: TaskStatus!
  estimatedHours: Float @deprecated(reason: "No more estimations!")
  actualHours: Float
  createdAt: String   # ISO date
  completedAt: String # ISO date

  # New fields with different list patterns
  labels: [String]  # nullable list of nullable labels
  subtasks: [Task!]  # nullable list of non-nullable subtasks
  dependencies: [Task]!  # non-nullable list of nullable tasks
  attachmentUrls: [String!]!  # non-nullable list of non-nullable URLs
  reviewerIds: [Int]  # nullable list of nullable reviewer IDs

  # Computed fields with @connect__fieldResolver
  isBlocked(checkDependencies: Boolean): Boolean! @connect__fieldResolver(context: "id status")
  totalEffort(includeSubtasks: Boolean): Float @connect__fieldResolver(context: "id estimatedHours actualHours")
}

type ProjectUpdate implements Node {
  id: ID!
  projectId: ID!
  updatedById: Int!
  updateType: ProjectUpdateType!
  description: String!
  timestamp: String!  # ISO date
  metadata: String    # JSON metadata
}

# Enums
enum ProjectStatus {
  PLANNING
  ACTIVE
  COMPLETED
  ON_HOLD
}

enum MilestoneStatus {
  PENDING
  IN_PROGRESS
  COMPLETED
  DELAYED
}

enum TaskStatus {
  TODO
  IN_PROGRESS
  REVIEW
  COMPLETED
  BLOCKED
}

enum TaskPriority {
  LOW
  MEDIUM
  HIGH
  URGENT
}

enum ProjectUpdateType {
  STATUS_CHANGE
  MILESTONE_ADDED
  TASK_ASSIGNED
  PROGRESS_UPDATE
  TEAM_CHANGE
}

# Unions
union ProjectResource = Employee | Product | Milestone | Task

union ProjectSearchResult = Project | Milestone | Task

union ProjectActivity = ProjectUpdate | Milestone | Task

# Abstract types for @requires composite type testing

interface EmployeeWorkItem {
  name: String!
  priority: Int!
}

type TechnicalWorkItem implements EmployeeWorkItem @shareable {
  name: String!
  priority: Int!
  codeCount: Int!
  handler: WorkItemHandler!
  specs: TechnicalSpecs!
}

type ManagementWorkItem implements EmployeeWorkItem @shareable {
  name: String!
  priority: Int!
  teamSize: String!
  handler: WorkItemHandler!
  specs: ManagementSpecs!
}

type WorkItemHandler @shareable {
  name: String!
  assignedItem: EmployeeWorkItem!
}

type TechnicalSpecs @shareable {
  name: String!
  complexity: Float!
  metrics: WorkMetrics!
}

type ManagementSpecs @shareable {
  name: String!
  scope: Float!
  metrics: WorkMetrics!
}

type WorkMetrics @shareable {
  score: Float!
  efficiency: Float!
}

union WorkReviewResult = WorkApproval | WorkRejection

type WorkApproval @shareable {
  comment: String!
  approvedAt: String!
}

type WorkRejection @shareable {
  reason: String!
  rejectionCode: String!
}

type WorkSetup @shareable {
  priority: String!
  primaryItem: EmployeeWorkItem!
}

# Federated types
type Employee @key(fields: "id") {
  id: Int!
  expertise: String! @external
  # New field resolved by this subgraph:
  projects: [Project!]
  # New fields for extended functionality
  assignedTasks: [Task!]!
  completedTasks: [Task!]!

  # New fields with different list patterns
  skills: [String]  # nullable list of nullable skills
  certifications: [String!]  # nullable list of non-nullable certifications
  projectHistory: [[Project!]]!  # non-nullable list of nullable lists of non-nullable projects

  # Field requiring expertise from employees subgraph
  taggedProjectSummary: String! @requires(fields: "expertise")
  filteredProjectSummary(tag: String!): String! @requires(fields: "expertise")

  # External abstract type fields for @requires testing
  primaryWorkItem: EmployeeWorkItem @external
  lastWorkReview: WorkReviewResult @external
  workSetup: WorkSetup @external

  # @requires fields using abstract types
  # Pattern 1: Flat abstract — interface
  workItemInfo: String! @requires(fields: "primaryWorkItem { __typename ... on TechnicalWorkItem { name codeCount } ... on ManagementWorkItem { name teamSize } }")
  # Pattern 2: Flat abstract — union
  reviewReport: String! @requires(fields: "lastWorkReview { ... on WorkApproval { __typename comment approvedAt } ... on WorkRejection { __typename reason rejectionCode } }")
  # Pattern 3: Concrete wrapping abstract
  workSetupSummary: String! @requires(fields: "workSetup { priority primaryItem { __typename ... on TechnicalWorkItem { name codeCount } ... on ManagementWorkItem { name teamSize } } }")
  # Pattern 4: Concrete message inside fragment
  workItemHandlerInfo: String! @requires(fields: "primaryWorkItem { __typename ... on TechnicalWorkItem { handler { name } } ... on ManagementWorkItem { handler { name } } }")
  # Pattern 5: Deep concrete nesting inside fragment (specs → metrics)
  workItemSpecsInfo: String! @requires(fields: "primaryWorkItem { __typename ... on TechnicalWorkItem { specs { name metrics { score efficiency } } } ... on ManagementWorkItem { specs { name metrics { score efficiency } } } }")
  # Pattern 6: Nested abstract through concrete intermediary (handler → assignedItem)
  deepWorkItemInfo: String! @requires(fields: "primaryWorkItem { __typename ... on TechnicalWorkItem { handler { assignedItem { __typename ... on ManagementWorkItem { name teamSize } ... on TechnicalWorkItem { name codeCount } } } } ... on ManagementWorkItem { handler { name } } }")

  # Computed fields with @connect__fieldResolver
  currentWorkload(includeCompleted: Boolean, projectId: ID): Int! @connect__fieldResolver(context: "id")
  averageTaskCompletionDays(projectId: ID, priority: TaskPriority): Float @connect__fieldResolver(context: "id")

  # No-arg field resolver (expensive computed field without arguments)
  totalProjectCount: Int! @connect__fieldResolver(context: "id")
}

type Product @key(fields: "upc") {
  upc: String!
  # Projects contributing to this product:
  projects: [Project!]

  # New field with nested lists
  featureMatrix: [[String]]  # nullable list of nullable lists of nullable features
}
