}

type notion_DataSource {
  id: ID!
  databaseId: ID!
  name: String
}

type notion_Block {
  id: ID!
  type: String!
  hasChildren: Boolean!
  archived: Boolean!
  content: notion_JSON!
}

type notion_BlockChildrenResult {
  blocks: [notion_Block!]!
  hasMore: Boolean!
  nextCursor: String
}

type notion_QueryDataSourceResult {
  pages: [notion_Page!]!
  hasMore: Boolean!
  nextCursor: String
}

type notion_SearchResult {
  objectType: notion_ObjectType!
  id: ID!
  title: String!
