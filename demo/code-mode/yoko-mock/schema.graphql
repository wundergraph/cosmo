"""
PostHog — product telemetry queryable via HogQL.
Customers/orgs are modeled as PostHog `groups` (typeIndex 0..4).
All types vendor-prefixed with `posthog_`.

Mock auth requires both X-Posthog-Token and X-Posthog-Project-Id metadata.
"""
scalar posthog_JSON

type posthog_QueryResult {
  columns: [String!]!
  types: [String!]!
  rows: [posthog_JSON!]!
  hasMore: Boolean!
  queryId: String
  asyncStatus: posthog_AsyncQueryStatus
}

type posthog_AsyncQueryStatus {
  queryId: String!
  state: posthog_AsyncQueryState!
  errorMessage: String
}

enum posthog_AsyncQueryState {
  PENDING
  RUNNING
  COMPLETED
  ERROR
}

input posthog_QueryInput {
  """
  Pre-defined query to execute. Recommended path — runs a curated mock
  handler and is guaranteed to succeed. Takes precedence over `hogql`
  when both are set.
  """
  preset: posthog_HogQLPreset
  """
  Parameters consumed by the chosen `preset`. See each enum value's docs
  for which fields it requires.
  """
  presetParams: posthog_HogQLPresetParams
  """
  Freeform HogQL string. Only the exact shapes recognised by the preset
  matchers will succeed; any other query returns Unimplemented.
  Prefer `preset` for new callers. Omit when `preset` is set.
  """
  hogql: String
  refresh: posthog_RefreshMode
  filtersOverride: posthog_JSON
}

"""
Pre-defined HogQL queries available in the mock. Each value runs a
curated handler over the seeded event data and is guaranteed to execute.
"""
enum posthog_HogQLPreset {
  """
  Quarter-over-quarter event count for one company.
  Required params: `domain` (e.g. "ebay.com").
  Returns rows of (quarter DateTime, events UInt64).
  """
  QOQ_COMPANY
  """
  Daily-active-users + per-day event count for one company over the
  last 30 days.
  Required params: `domain`.
  Returns rows of (day Date, dau UInt64, events UInt64).
  """
  DAU_TIMESERIES_COMPANY
  """
  Accounts whose 30-day event volume dropped >20% versus the prior 30
  days, sorted ascending by pct_change (most-at-risk first).
  Required params: none.
  Returns rows of (key, recent, prior, delta, pct_change).
  """
  AT_RISK_ACCOUNTS
  """
  Feature-adoption matrix across the top-10 customers (one row per
  customer × feature_slug used).
  Required params: none.
  Returns rows of (key, feature_slug, uses).
  """
  FEATURE_ADOPTION_TOP10
  """
  P95 request latency bucketed hourly for one company in a time window.
  Required params: `domain`, `start`, `end` (RFC3339, e.g.
  "2026-04-21T14:00:00Z").
  Returns rows of (hour DateTime, p95_ms Float64).
  """
  LATENCY_HOURLY_COMPANY
  """
  Per-event-name count for one company in a time window.
  Required params: `domain`, `start` (RFC3339); optional: `end` (RFC3339).
  Returns rows of (event String, count UInt64).
  """
  EVENT_BREAKDOWN_WINDOW
  """
  Week-over-week event delta across the entire portfolio (per group_0),
  sorted by delta descending.
  Required params: none.
  Returns rows of (key, this_count, prev_count, delta).
  """
  WEEKLY_PORTFOLIO_DELTA
}

"""
Parameters for a `posthog_HogQLPreset` query. Only the fields required
by the chosen preset need to be set; extras are ignored.
"""
input posthog_HogQLPresetParams {
  """Group key, typically a customer domain like "ebay.com"."""
  domain: String
  """
  RFC3339 start timestamp with time component, e.g. "2026-04-21T14:00:00Z".
  """
  start: String
  """
  RFC3339 end timestamp with time component, e.g. "2026-04-21T15:00:00Z".
  """
  end: String
}

enum posthog_RefreshMode {
  BLOCKING
  ASYNC
  LAZY
  FORCE_BLOCKING
  FORCE_ASYNC
}

type posthog_Group {
  typeIndex: Int!
  key: String!
  properties: posthog_JSON!
