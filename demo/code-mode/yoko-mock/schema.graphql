  (usually properties["Name"].title[0].plain_text), and the resolver derives this value.
  """
  title: String!
  url: String!
  parentId: ID
  parentType: notion_ParentType
  createdAt: notion_DateTime!
  updatedAt: notion_DateTime!
  archived: Boolean!
  properties: notion_JSON!
}

type notion_Database {
  id: ID!
  title: String!
  url: String!
  createdAt: notion_DateTime!
  updatedAt: notion_DateTime!
