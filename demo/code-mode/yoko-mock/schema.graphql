"""
Slack — read shared customer channels, message history, user info.
All types vendor-prefixed with `slack_`.
"""
type Query {
  pylon_searchAccounts(input: pylon_SearchAccountsInput!): [pylon_Account!]!
  pylon_getAccount(id: ID!): pylon_Account
  pylon_searchIssues(input: pylon_SearchIssuesInput!): [pylon_Issue!]!
  pylon_getIssue(id: ID!): pylon_Issue
  pylon_listIssueMessages(issueId: ID!): [pylon_Message!]!
  pylon_listContacts(input: pylon_ListContactsInput!): [pylon_Contact!]!
  pylon_listSurveys(limit: Int, cursor: String): [pylon_Survey!]!
  pylon_getSurveyResponses(surveyId: ID!): [pylon_SurveyResponse!]!
  """
  Canonical custom-field slugs: arr, renewal_date, segment, csm_owner, health_status.
  """
  pylon_listAccountCustomFields: [pylon_CustomField!]!
  pylon_listUsers: [pylon_User!]!
  linear_customer(id: ID!): linear_Customer
  linear_customerByDomain(domain: String!): linear_Customer
  linear_customers(filter: linear_CustomersFilter): [linear_Customer!]!
  linear_customerNeeds(filter: linear_CustomerNeedsFilter): [linear_CustomerNeed!]!
  linear_issue(id: ID!): linear_Issue
  linear_issues(filter: linear_IssuesFilter): [linear_Issue!]!
  linear_team(id: ID!): linear_Team
  linear_teams: [linear_Team!]!
  linear_cycles(teamId: ID): [linear_Cycle!]!
  linear_project(id: ID!): linear_Project
  linear_user(id: ID!): linear_User
  """
  Run a HogQL query. Two modes are supported:
  
  1. **Preset (recommended)** — set `input.preset` to one of the values
  of `posthog_HogQLPreset`. These map 1:1 to the curated mock handlers
  and are guaranteed to execute. Pass any required parameters via
  `input.presetParams` (see each enum value's docs for what it needs).
  
  2. **Freeform** — set `input.hogql` to a raw HogQL string. Only the exact
  shapes recognised by the preset matchers will succeed; any other query
  returns Unimplemented with the supported handler list.
  
  If both `preset` and `hogql` are set, `preset` takes precedence.
  """
  posthog_query(input: posthog_QueryInput!): posthog_QueryResult!
  """List groups (customer orgs) for a given group type index."""
  posthog_listGroups(input: posthog_ListGroupsInput!): [posthog_Group!]!
  posthog_getGroup(typeIndex: Int!, key: String!): posthog_Group
  posthog_listEvents(input: posthog_ListEventsInput!): posthog_ListEventsResult!
  """
  List feature flags configured for the project (used for feature-adoption mapping).
  """
  posthog_listFeatureFlags(limit: Int): [posthog_FeatureFlag!]!
  """Poll an async query result by id."""
  posthog_getAsyncQueryStatus(queryId: String!): posthog_AsyncQueryStatus!
  circleback_searchMeetings(input: circleback_SearchMeetingsInput!): [circleback_Meeting!]!
  circleback_readMeetings(meetingIds: [ID!]!): [circleback_Meeting!]!
  circleback_getTranscripts(meetingIds: [ID!]!): [circleback_Transcript!]!
  circleback_searchTranscripts(query: String!, limit: Int): [circleback_TranscriptHit!]!
  circleback_searchActionItems(query: String!, limit: Int): [circleback_ActionItem!]!
  circleback_findDomains(query: String!): [circleback_Domain!]!
  circleback_findProfiles(query: String!): [circleback_Profile!]!
  circleback_searchCalendarEvents(input: circleback_SearchCalendarInput!): [circleback_CalendarEvent!]!
  circleback_listTags: [String!]!
  slack_listChannels(input: slack_ListChannelsInput!): [slack_Channel!]!
  slack_getChannel(channelId: ID!): slack_Channel
  slack_history(input: slack_HistoryInput!): slack_HistoryResult!
  slack_replies(channelId: ID!, threadTs: String!, limit: Int): [slack_Message!]!
  slack_userInfo(userId: ID!): slack_User
  slack_listUsers(limit: Int, cursor: String): [slack_User!]!
  slack_searchMessages(query: String!, count: Int, page: Int): [slack_Message!]!
  slack_authTest: slack_AuthTestResult!
  notion_search(input: notion_SearchInput!): [notion_SearchResult!]!
  notion_getPage(pageId: ID!): notion_Page
  notion_getDatabase(databaseId: ID!): notion_Database
  notion_queryDataSource(input: notion_QueryDataSourceInput!): notion_QueryDataSourceResult!
  notion_getBlockChildren(blockId: ID!, limit: Int, cursor: String): notion_BlockChildrenResult!
  notion_listUsers(limit: Int, cursor: String): [notion_User!]!
}

