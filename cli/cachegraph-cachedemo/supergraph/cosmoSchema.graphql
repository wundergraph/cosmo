schema {
  query: Query
  mutation: Mutation
}

directive @inaccessible on ARGUMENT_DEFINITION | ENUM | ENUM_VALUE | FIELD_DEFINITION | INPUT_FIELD_DEFINITION | INPUT_OBJECT | INTERFACE | OBJECT | SCALAR | UNION

type Query {
  """Simple key lookup"""
  article(id: ID!): Article
  """List query"""
  articles: [Article!]!
  """Batch lookup with @openfed__is"""
  articlesByIds(ids: [ID!]!): [Article!]!
  """Argument remapping via @openfed__is"""
  articleBySlug(slug: ID!): Article
  """Composite key lookup via input object with @openfed__is"""
  listing(key: ListingKey!): Listing
  """List of all listings"""
  listings: [Listing!]!
  """Nested key lookup with @openfed__is and input object"""
  venue(location: VenueLocationKey!): Venue
  """List of all venues"""
  venues: [Venue!]!
  """Per-user profile (cache varies by Authorization header)"""
  userProfile(id: ID!): UserProfile
  """Single catalog entry"""
  catalog(id: ID!): Catalog
  """All catalog entries (for partial cache load testing)"""
  catalogs: [Catalog!]!
  """
  Single metric (shadow mode - always fetches from subgraph, compares with cache)
  """
  metric(id: ID!): Metric
  currentViewer: Viewer
}

type Mutation {
  updateArticle(id: ID!, title: String!): Article
  createArticle(title: String!, body: String!, authorName: String!): Article!
  deleteListing(key: ListingKey!): Listing
}

"""
Per-user caching: includeHeaders makes the cache key include a hash of forwarded headers (e.g. Authorization)
"""
type UserProfile {
  id: ID!
  username: String!
  email: String!
  role: String!
}

"""
Partial cache load: when some entities are cached and others aren't, only the missing ones are fetched
"""
type Catalog {
  id: ID!
  name: String!
  category: String!
  itemCount: Int!
  description: String!
  lastUpdated: String!
}

"""
Shadow mode: always fetches from subgraph but compares with cache for staleness detection
"""
type Metric {
  id: ID!
  name: String!
  value: Float!
  unit: String!
}

input ListingKey {
  sellerId: ID!
  sku: String!
}

input VenueLocationKey {
  address: VenueAddressKey!
}

input VenueAddressKey {
  id: ID!
}

interface Personalized {
  id: ID!
  currentViewer: Viewer @inaccessible
}

type Viewer {
  id: ID!
  recommendedArticles: [Article!]!
  name: String!
  email: String!
}

type Listing {
  sellerId: ID!
  sku: String!
  title: String!
  price: Float!
  currency: String!
  inStock: Boolean!
}

type Address {
  id: ID!
}

type Venue {
  address: Address!
  name: String!
  capacity: Int!
  city: String!
}

type Article implements Personalized {
  id: ID!
  title: String!
  body: String!
  authorName: String!
  publishedAt: String!
  tags: [String!]!
  currentViewer: Viewer
  viewCount: Int!
  rating: Float!
  reviewSummary: String!
  relatedArticles: [Article!]!
  personalizedRecommendation: String!
}