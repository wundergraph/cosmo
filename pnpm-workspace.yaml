packages:
  - aws-lambda-router
  - cli
  - composition
  - docs-website
  - graphqlmetrics
  - controlplane
  - controlplane/emails
  - proto
  - router
  - router-plugin
  - shared
  - studio
  - connect
  - cdn-server
  - cdn-server/cdn
  - admission-server
  - protographic
  - playground

fetchRetries: 10
ignoreWorkspaceRootCheck: true
dedupePeerDependents: false

overrides:
  react: 18.3.1
  graphql: 16.9.0
  cross-spawn: 7.0.6
  next: 15.5.15
  zod: ^3.25.0
  debug: <4.4.2
  supports-color: <10.2.1
  wrap-ansi: <9.0.1
  color-convert: <3.1.1
  color-name: <2.0.1
  is-arrayish: <0.3.3
  slice-ansi: <7.1.1
  color: <5.0.1
  color-string: <2.1.1
  simple-swizzle: <0.2.3
  supports-hyperlinks: <4.1.1
  has-ansi: <6.0.1
  chalk-template: <1.1.1
  backslash: <0.2.1
  qs: 6.14.1
  mdast-util-to-hast: '>=13.2.1'
  js-yaml: '>=4.1.1'
  fast-xml-parser: 5.5.6
  '@aws-sdk/client-sesv2': ^3.996.0
  handlebars: 4.7.9
  socket.io-parser: 4.2.6
  minimatch@3.x: 3.1.4
  minimatch@4.x: 4.2.5
  minimatch@5.x: 5.1.8
  minimatch@8.x: 8.0.6
  minimatch@9.x: 9.0.7
  minimatch@10.x: 10.2.4
  express-rate-limit: 8.2.2
  serialize-javascript: 7.0.3
  markdown-it: 14.1.1
  rollup@3.29.5: 3.30.0
  '@rollup/pluginutils@5.3.0>rollup': 4.59.0

patchedDependencies:
  graphql@16.9.0: patches/graphql@16.9.0.patch

allowBuilds:
  '@bufbuild/buf': true
  '@sentry-internal/node-cpu-profiler': true
  '@sentry-internal/node-native-stacktrace': true
  '@sentry/cli': true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  msw: true
  protobufjs: true
  sharp: true

catalog:
  # Build/test tooling
  typescript: 5.6.2
  vitest: ^3.2.4
  '@vitest/coverage-v8': 3.2.4
  tsx: ^4.16.0
  prettier: ^3.6.2

  # Linting
  eslint: ^8.57.1
  eslint-config-unjs: ^0.2.1
  eslint-plugin-require-extensions: ^0.1.3
  del-cli: ^5.1.0

  # React
  react: 18.3.1
  react-dom: 18.3.1
  '@types/react': 18.3.3
  '@types/react-dom': 18.3.0

  # Runtime deps
  graphql: ^16.9.0
  zod: ^3.25.0
  axios: 1.13.5
  dotenv: 16.6.0
  date-fns: ^3.6.0
  lodash: 4.18.1
  lodash-es: 4.18.1
  hono: 4.12.12
  pino: ^8.19.0

  # Types
  '@types/node': ^22.0.0
  '@types/lodash': 4.17.24
  '@types/lodash-es': 4.17.12

  # Buf/Connect
  '@bufbuild/protobuf': ^1.9.0
  '@connectrpc/connect': 1.5.0
  '@connectrpc/connect-node': 1.5.0
  '@connectrpc/connect-query': ^1.4.1
  '@connectrpc/connect-web': 1.5.0

  # GraphQL tooling
  '@graphql-tools/utils': ^11.0.0
