syntax = "proto3";

package com.wundergraph.connectrpc.options.v1;

import "google/protobuf/descriptor.proto";

// WunderGraph Connect RPC field options for GraphQL integration.
//
// These extensions enable seamless mapping between protobuf conventions
// and GraphQL conventions when using Connect RPC with GraphQL backends.
extend google.protobuf.FieldOptions {
  // graphql_variable_name specifies the exact GraphQL variable name to use for this field.
  //
  // This is useful when the GraphQL variable naming convention differs from protobuf JSON naming.
  // Protobuf JSON automatically converts snake_case field names to camelCase, but GraphQL
  // variables can use any naming convention (camelCase, SCREAMING_SNAKE_CASE, etc.).
  //
  // Example:
  //   message FindEmployeesByCriteriaRequest {
  //     bool has_pets = 1 [(wg.connectrpc.graphql_variable_name) = "HAS_PETS"];
  //     Nationality nationality = 2 [(wg.connectrpc.graphql_variable_name) = "Nationality"];
  //   }
  //
  // This will map:
  //   - Protobuf JSON field "hasPets" → GraphQL variable "$HAS_PETS"
  //   - Protobuf JSON field "nationality" → GraphQL variable "$Nationality"
  //
  // Field number 50001 is in the user-defined extension range (1000-536870911).
  string graphql_variable_name = 50001;
}
