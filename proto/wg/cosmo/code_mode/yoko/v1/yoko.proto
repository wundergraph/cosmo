syntax = "proto3";

package yoko.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/wundergraph/yoko/gen/yoko/v1;yokov1";

// YokoService turns natural-language prompts into validated GraphQL
// operations against an indexed schema. Clients first index a schema
// (returning a stable schema_id) and then call GenerateQuery with that
// id and a prompt to receive one or more compiled operations.
service YokoService {
  // IndexSchema parses, enriches, embeds and indexes a GraphQL SDL.
  // Returns the deterministic schema_id callers pass to GenerateQuery.
  rpc IndexSchema(IndexSchemaRequest) returns (IndexSchemaResponse);

  // GenerateQuery turns a natural-language prompt into one or more
  // compiled GraphQL operations against the previously indexed schema.
  rpc GenerateQuery(GenerateQueryRequest) returns (GenerateQueryResponse);
}

message IndexSchemaRequest {
  // GraphQL Schema Definition Language (SDL) for the target API.
  // Must contain at least one non-whitespace character.
  string sdl = 1 [(buf.validate.field).string.pattern = "\\S"];
}

message IndexSchemaResponse {
  // Stable id derived from the indexed SDL; pass to GenerateQuery.
  string schema_id = 1;
}

message GenerateQueryRequest {
  // schema_id from a prior IndexSchema call.
  string schema_id = 1 [(buf.validate.field).string.pattern = "\\S"];

  // Natural-language description of what the caller wants to fetch.
  string prompt = 2 [(buf.validate.field).string.pattern = "\\S"];
}

message GenerateQueryResponse {
  Resolution resolution = 1;
}

message Resolution {
  // One entry per produced query; each is a self-contained operation
  // with a natural-language description of what it does.
  repeated ResolvedQuery queries = 1;

  // One entry per requirement we could not satisfy; each carries a
  // natural-language reason.
  repeated Unsatisfied unsatisfied = 2;

  // True when the propose agent ran out of turns before committing
  // every requirement; clients may want to retry with a tighter prompt.
  bool truncated = 3;
}

message ResolvedQuery {
  // One short user-facing sentence describing what this query does.
  string description = 1;

  // GraphQL operation document — exactly one named operation.
  string document = 2;

  // Operation name parsed from the document (e.g. "GetUserPosts").
  string operation_name = 3;

  // One of "query", "mutation", "subscription".
  string operation_type = 4;

  // JSON Schema for the operation's $variables object, derived
  // statically from the document. Carried as a JSON-encoded string so
  // JSON clients see a readable schema (a `bytes` field would surface
  // as base64 over JSON transport).
  string variables_schema = 5;
}

message Unsatisfied {
  // Natural-language explanation of why this requirement could not
  // be satisfied (e.g. "no field on the schema carries that filter
  // dimension").
  string reason = 1;
}
